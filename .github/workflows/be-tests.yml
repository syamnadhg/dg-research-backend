name: Backend Tests

# Runs the pytest suite on every backend change so a regression is caught before
# merge — the BE counterpart to the FE's firestore-rules gate, satisfying the
# git-workflow "verify CI passes after every push" rule.
#
# Pytest only (no ruff gate): the repo intentionally ships NO [tool.ruff] config
# (see pyproject.toml) and carries a large pre-existing style baseline, so a full
# `ruff check` would be all-noise. Lint is enforced per-change locally, not in CI.

on:
  push:
    paths:
      - "**.py"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/be-tests.yml"
  pull_request:
    paths:
      - "**.py"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      # The suite is fully mocked (no real browser / network / Firestore), so it
      # only needs the packages importable — no `patchright install chrome`.
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q
